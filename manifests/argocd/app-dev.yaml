apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-api-dev
  namespace: argocd
spec:
  project: gitops-platform
  source:
    repoURL: https://github.com/Skanderba8/k8s-gitops-platform.git
    targetRevision: HEAD
    path: charts/demo-api
    helm:
      valueFiles:
        - ../../manifests/envs/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true