apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-api-dev
  namespace: argocd
spec:
  project: gitops-platform
  source:
    repoURL: https://github.com/Skanderba8/k8s-gitops-platform.git
    targetRevision: HEAD
    path: charts/demo-api
    helm:
      parameters:
        - name: image.tag
          value: "5ea11e60e52b0aa59c48f27726d241cc39c432f5"
        - name: replicaCount
          value: "1"
        - name: env.APP_ENV
          value: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true