name: Promote to prod

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy dev tag to prod
        run: |
          DEV_TAG=$(grep 'tag:' manifests/envs/dev/values.yaml | awk '{print $2}' | tr -d '"')
          sed -i "s|tag:.*|tag: \"$DEV_TAG\"|" manifests/envs/prod/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/envs/prod/values.yaml
          git commit -m "ci: promote $DEV_TAG to prod"
          git push