name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-gitops-platform/demo-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: |
          cd app
          python -m pytest test_main.py -v

  build-push-update:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} ./app
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Update image tag in dev values
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" manifests/envs/dev/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/envs/dev/values.yaml
          git commit -m "ci: update dev image tag to ${{ github.sha }}"
          git push